kind = "web"
previewPath = "/"
title = "Linguastar"
version = "1.0.0"
id = "artifacts/linguastar"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23272

[services.development]
run = "pnpm --filter @workspace/linguastar run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/linguastar", "run", "build" ]
publicDir = "artifacts/linguastar/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23272"
BASE_PATH = "/"
